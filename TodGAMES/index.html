<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tiny Explorers</title>
<meta name="theme-color" content="#4DC8E8">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky:#4DC8E8;
    --sky-deep:#2EA8CB;
    --sun:#FFD23F;
    --coral:#FF6B5B;
    --grass:#6FCF73;
    --grape:#9B6BCE;
    --cloud:#FFFDF7;
    --ink:#3A3A3A;
    --font-display:'Baloo 2', ui-rounded, 'SF Pro Rounded', system-ui, -apple-system, sans-serif;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; overflow:hidden; touch-action:manipulation; }
  body{
    font-family:var(--font-display);
    background:linear-gradient(180deg, var(--sky) 0%, var(--sky-deep) 100%);
    color:var(--ink);
    user-select:none;
  }

  /* ---------- Drifting background clouds ---------- */
  .cloud{
    position:fixed; top:0; left:0;
    opacity:0.9; pointer-events:none; z-index:0;
  }
  @keyframes drift{
    from{ transform:translateX(-20vw); }
    to{ transform:translateX(120vw); }
  }

  /* ---------- HOME VIEW ---------- */
  #home-view{
    position:relative; height:100%; width:100%;
    display:flex; flex-direction:column; align-items:center;
    padding-top:5vh;
    z-index:1;
  }
  .app-title{
    font-weight:800; font-size:clamp(28px,6vw,48px);
    color:var(--cloud);
    text-shadow:0 4px 0 rgba(0,0,0,0.12);
    margin:0 0 2vh 0;
    letter-spacing:0.5px;
  }
  .bubble-field{
    flex:1;
    width:min(560px, 92vw);
    display:flex;
    flex-wrap:wrap;
    align-content:center;
    justify-content:center;
    gap:6vh 8vw;
    padding-bottom:4vh;
  }
  .bubble{
    width:clamp(110px,30vw,170px);
    height:clamp(110px,30vw,170px);
    border-radius:50%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    box-shadow:0 10px 0 rgba(0,0,0,0.10), inset 0 -8px 18px rgba(0,0,0,0.08), inset 0 8px 18px rgba(255,255,255,0.35);
    cursor:pointer;
    border:none;
    animation:bob 5s ease-in-out infinite;
    transition:transform 0.15s ease;
  }
  .bubble:active{ transform:scale(0.92); }
  .bubble .emoji{ font-size:clamp(40px,11vw,64px); line-height:1; filter:drop-shadow(0 3px 0 rgba(0,0,0,0.12)); }
  .bubble .label{ font-weight:700; font-size:clamp(14px,3.4vw,20px); color:var(--cloud); margin-top:2px; text-shadow:0 2px 0 rgba(0,0,0,0.15); }

  @keyframes bob{
    0%,100%{ transform:translateY(0px) rotate(-2deg); }
    50%{ transform:translateY(-16px) rotate(2deg); }
  }

  #b-animals{ background:var(--coral); animation-delay:0s; }
  #b-counting{ background:var(--grass); animation-delay:0.6s; }
  #b-colors{ background:var(--sun); animation-delay:1.1s; }
  #b-shapes{ background:var(--grape); animation-delay:1.7s; }

  /* ---------- ACTIVITY VIEW ---------- */
  #activity-view{
    display:none;
    position:fixed; inset:0;
    background:linear-gradient(180deg, var(--sky) 0%, var(--sky-deep) 100%);
    z-index:5;
    flex-direction:column;
    align-items:center;
  }
  #activity-view.show{ display:flex; }

  .grid{
    flex:1;
    width:100%;
    max-width:780px;
    display:grid;
    gap:3vw;
    padding:4vh 4vw 14vh 4vw;
    align-content:center;
    overflow:auto;
  }
  .grid.cols-4{ grid-template-columns:repeat(4,1fr); }
  .grid.cols-2{ grid-template-columns:repeat(2,1fr); }

  .tile{
    background:var(--cloud);
    border-radius:28px;
    border:none;
    aspect-ratio:1;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 0 rgba(0,0,0,0.10);
    cursor:pointer;
    transition:transform 0.12s ease;
    font-size:clamp(34px,9vw,56px);
    position:relative;
  }
  .tile:active{ transform:scale(0.9); }

  .home-btn{
    position:fixed; left:4vw; bottom:4vh;
    width:clamp(64px,16vw,84px); height:clamp(64px,16vw,84px);
    border-radius:50%;
    background:var(--cloud);
    border:none;
    box-shadow:0 8px 0 rgba(0,0,0,0.12);
    display:flex; align-items:center; justify-content:center;
    font-size:clamp(28px,7vw,38px);
    z-index:10;
    cursor:pointer;
  }
  .home-btn:active{ transform:scale(0.9); }

  /* ---------- Stage (full-screen reaction display) ---------- */
  #stage{
    position:fixed; inset:0;
    display:none;
    align-items:center; justify-content:center;
    flex-direction:column;
    z-index:20;
    transition:background-color 0.25s ease;
  }
  #stage.show{ display:flex; }
  #stage .stage-emoji{
    font-size:clamp(110px,38vw,260px);
    animation:pop 0.5s ease;
  }
  #stage .stage-label{
    font-weight:800;
    font-size:clamp(28px,8vw,56px);
    color:var(--cloud);
    text-shadow:0 4px 0 rgba(0,0,0,0.15);
    margin-top:1vh;
  }
  #stage .counting-row{
    display:flex; flex-wrap:wrap; justify-content:center; gap:1.5vw;
    max-width:90vw;
  }
  #stage .counting-row span{
    font-size:clamp(36px,9vw,64px);
    opacity:0; transform:scale(0.3);
    animation:pop 0.4s ease forwards;
  }
  @keyframes pop{
    0%{ transform:scale(0.2); opacity:0; }
    60%{ transform:scale(1.15); opacity:1; }
    100%{ transform:scale(1); opacity:1; }
  }

  /* Shapes */
  .shape{ width:48%; height:48%; background:var(--grape); }
  .shape.circle{ border-radius:50%; }
  .shape.square{ border-radius:8%; }
  .shape.triangle{ background:transparent; clip-path:polygon(50% 0%, 0% 100%, 100% 100%); background:var(--grape); }
  .shape.star{ clip-path:polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
  .shape.hexagon{ clip-path:polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); }
  .shape.heart{ position:relative; background:transparent; }
  .shape.heart::before, .shape.heart::after{
    content:""; position:absolute; top:0; width:52%; height:80%;
    border-radius:50% 50% 0 0; background:var(--grape);
  }
  .shape.heart::before{ left:50%; transform:rotate(-45deg); transform-origin:0 100%; }
  .shape.heart::after{ left:0; transform:rotate(45deg); transform-origin:100% 100%; }

  .tile-shape-wrap{ width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
  .tile-shape{ width:55%; height:55%; }

  /* Confetti */
  .confetti{
    position:fixed; width:10px; height:10px; border-radius:3px;
    pointer-events:none; z-index:30;
  }

  @media (prefers-reduced-motion: reduce){
    .bubble{ animation:none; }
    #stage .stage-emoji{ animation:none; }
  }
</style>
</head>
<body>

<div id="home-view">
  <h1 class="app-title">Tiny Explorers</h1>
  <div class="bubble-field">
    <button class="bubble" id="b-animals" onclick="openActivity('animals')">
      <span class="emoji">🐮</span><span class="label">Animals</span>
    </button>
    <button class="bubble" id="b-counting" onclick="openActivity('counting')">
      <span class="emoji">⭐</span><span class="label">Counting</span>
    </button>
    <button class="bubble" id="b-colors" onclick="openActivity('colors')">
      <span class="emoji">🎨</span><span class="label">Colors</span>
    </button>
    <button class="bubble" id="b-shapes" onclick="openActivity('shapes')">
      <span class="emoji">🔺</span><span class="label">Shapes</span>
    </button>
  </div>
</div>

<div id="activity-view">
  <div class="grid" id="grid"></div>
  <button class="home-btn" onclick="goHome()">🏠</button>
</div>

<div id="stage" onclick="hideStage()">
  <div id="stage-content"></div>
</div>

<script>
  // ---------------- Content data (all original, no external media) ----------------
  const DATA = {
    animals: [
      {emoji:'🐮', name:'Cow', sound:'Moo'},
      {emoji:'🐶', name:'Dog', sound:'Woof'},
      {emoji:'🐱', name:'Cat', sound:'Meow'},
      {emoji:'🦆', name:'Duck', sound:'Quack'},
      {emoji:'🐷', name:'Pig', sound:'Oink'},
      {emoji:'🐑', name:'Sheep', sound:'Baa'},
      {emoji:'🐸', name:'Frog', sound:'Croak'},
      {emoji:'🐴', name:'Horse', sound:'Neigh'},
    ],
    counting: Array.from({length:10}, (_, i) => ({ n:i+1 })),
    colors: [
      {name:'Red', hex:'#FF6B5B'},
      {name:'Yellow', hex:'#FFD23F'},
      {name:'Blue', hex:'#4DC8E8'},
      {name:'Green', hex:'#6FCF73'},
      {name:'Purple', hex:'#9B6BCE'},
      {name:'Pink', hex:'#FF9FB2'},
      {name:'Orange', hex:'#FFA45C'},
      {name:'Teal', hex:'#4DD0C5'},
    ],
    shapes: [
      {name:'Circle', cls:'circle'},
      {name:'Square', cls:'square'},
      {name:'Triangle', cls:'triangle'},
      {name:'Star', cls:'star'},
      {name:'Heart', cls:'heart'},
      {name:'Hexagon', cls:'hexagon'},
    ],
  };

  let currentActivity = null;

  // ---------------- Speech ----------------
  function speak(text){
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.85;
    u.pitch = 1.25;
    window.speechSynthesis.speak(u);
  }

  // ---------------- Confetti ----------------
  const CONFETTI_COLORS = ['#FF6B5B','#FFD23F','#4DC8E8','#6FCF73','#9B6BCE','#FF9FB2'];
  function burstConfetti(x, y){
    for(let i=0;i<14;i++){
      const el = document.createElement('div');
      el.className = 'confetti';
      el.style.left = x+'px';
      el.style.top = y+'px';
      el.style.background = CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)];
      const angle = Math.random()*Math.PI*2;
      const dist = 60 + Math.random()*90;
      const dx = Math.cos(angle)*dist;
      const dy = Math.sin(angle)*dist - 40;
      el.style.transition = 'transform 0.8s ease-out, opacity 0.8s ease-out';
      document.body.appendChild(el);
      requestAnimationFrame(()=>{
        el.style.transform = `translate(${dx}px, ${dy}px) rotate(${Math.random()*360}deg)`;
        el.style.opacity = '0';
      });
      setTimeout(()=> el.remove(), 850);
    }
  }

  // ---------------- Navigation ----------------
  function openActivity(name){
    currentActivity = name;
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    grid.className = 'grid ' + (name === 'shapes' ? 'cols-2' : 'cols-4');

    const items = DATA[name];

    items.forEach((item) => {
      const tile = document.createElement('button');
      tile.className = 'tile';

      if (name === 'animals'){
        tile.textContent = item.emoji;
        tile.onclick = (e) => reactAnimal(item, e);
      } else if (name === 'counting'){
        tile.textContent = item.n;
        tile.style.fontWeight = '800';
        tile.style.color = '#2EA8CB';
        tile.onclick = (e) => reactCounting(item.n, e);
      } else if (name === 'colors'){
        tile.style.background = item.hex;
        tile.onclick = (e) => reactColor(item, e);
      } else if (name === 'shapes'){
        const wrap = document.createElement('div');
        wrap.className = 'tile-shape-wrap';
        const shape = document.createElement('div');
        shape.className = 'tile-shape shape ' + item.cls;
        wrap.appendChild(shape);
        tile.appendChild(wrap);
        tile.style.background = 'var(--cloud)';
        tile.onclick = (e) => reactShape(item, e);
      }
      grid.appendChild(tile);
    });

    document.getElementById('home-view').style.display = 'none';
    document.getElementById('activity-view').classList.add('show');
  }

  function goHome(){
    window.speechSynthesis && window.speechSynthesis.cancel();
    hideStage();
    document.getElementById('activity-view').classList.remove('show');
    document.getElementById('home-view').style.display = 'flex';
  }

  // ---------------- Reactions ----------------
  function showStage(html, bg){
    const stage = document.getElementById('stage');
    document.getElementById('stage-content').innerHTML = html;
    stage.style.backgroundColor = bg || 'rgba(46,168,203,0.97)';
    stage.classList.add('show');
  }
  function hideStage(){
    document.getElementById('stage').classList.remove('show');
  }

  function reactAnimal(item, e){
    burstConfetti(e.clientX, e.clientY);
    showStage(`
      <div style="text-align:center">
        <div class="stage-emoji">${item.emoji}</div>
        <div class="stage-label">${item.name} says ${item.sound}!</div>
      </div>
    `);
    speak(`${item.name} says ${item.sound}!`);
    setTimeout(hideStage, 2200);
  }

  function reactColor(item, e){
    burstConfetti(e.clientX, e.clientY);
    showStage(`<div class="stage-label">${item.name}</div>`, item.hex);
    speak(item.name);
    setTimeout(hideStage, 1600);
  }

  function reactShape(item, e){
    burstConfetti(e.clientX, e.clientY);
    showStage(`
      <div style="text-align:center">
        <div class="shape ${item.cls}" style="width:40vmin;height:40vmin;margin:0 auto;animation:pop 0.5s ease;"></div>
        <div class="stage-label">${item.name}</div>
      </div>
    `);
    speak(item.name);
    setTimeout(hideStage, 2000);
  }

  function reactCounting(n, e){
    burstConfetti(e.clientX, e.clientY);
    let row = '';
    for(let i=1;i<=n;i++){
      row += `<span style="animation-delay:${i*0.18}s">⭐</span>`;
    }
    showStage(`
      <div style="text-align:center">
        <div class="counting-row">${row}</div>
        <div class="stage-label" style="margin-top:3vh;">${n}</div>
      </div>
    `);
    // Speak numbers one by one, then total
    window.speechSynthesis && window.speechSynthesis.cancel();
    for(let i=1;i<=n;i++){
      setTimeout(()=>{
        const u = new SpeechSynthesisUtterance(String(i));
        u.rate = 0.9; u.pitch = 1.25;
        window.speechSynthesis.speak(u);
      }, i*450);
    }
    setTimeout(()=>{
      speak(`There ${n===1?'is':'are'} ${n} star${n===1?'':'s'}!`);
    }, n*450 + 300);
    setTimeout(hideStage, n*450 + 2200);
  }

  // ---------------- Decorative drifting clouds ----------------
  function addClouds(){
    const home = document.getElementById('home-view');
    const positions = [{top:'8%',size:70,dur:38},{top:'22%',size:50,dur:52},{top:'70%',size:60,dur:45}];
    positions.forEach((p, i) => {
      const c = document.createElement('div');
      c.className = 'cloud';
      c.style.top = p.top;
      c.style.fontSize = p.size+'px';
      c.style.animation = `drift ${p.dur}s linear infinite`;
      c.style.animationDelay = (i*7)+'s';
      c.textContent = '☁️';
      home.appendChild(c);
    });
  }
  addClouds();

  // ---------------- Register service worker (offline support) ----------------
  if ('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    });
  }
</script>
</body>
</html>
